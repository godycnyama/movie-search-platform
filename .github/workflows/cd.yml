# CD — triggered when CI completes successfully on master. It never generates a
# plan itself: it downloads the exact `terraform plan` artifacts CI produced for
# the same commit, then applies them behind a manual approval gate.
#
#   build-push   build + push the api & mcp-server images to the dev ECR
#   deploy-dev   apply the reviewed DEV plan  (gated by the `dev` environment)
#   smoke-dev    health + auth smoke tests against the deployed dev API
#   deploy-prod  promote images + apply the reviewed PROD plan
#                (gated by the `production` environment)
#
# The approval on each environment IS the inspection gate: before approving,
# open the triggering CI run and read the plan (the run summary shows it, and the
# `terraform-plan-<env>` artifact is downloadable). CD then applies that exact
# saved plan — what you reviewed is what ships.
#
# AWS access is via OIDC only (aws-actions/configure-aws-credentials assumes the
# Terraform-created deploy role) — no long-lived keys anywhere.
#
# The data pipeline is NOT deployed here; it runs locally via docker-compose.
#
# Required repository VARIABLES (Settings -> Secrets and variables -> Actions):
#   AWS_REGION           e.g. eu-west-1
#   AWS_DEPLOY_ROLE_ARN  terraform output github_deploy_role_arn (dev stack)
#   TF_STATE_BUCKET      name of the separately-managed S3 state bucket
#   TF_LOCK_TABLE        name of the separately-managed DynamoDB lock table
#
# Required GitHub ENVIRONMENTS, BOTH with required reviewers (the manual gates):
#   `dev`  and  `production`
#
# FIRST-TIME SETUP: apply each environment once from a workstation
# (terraform/README.md) so the ECR repositories and the deploy role exist
# before this workflow first runs.

name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: cd-master
  cancel-in-progress: false # never cancel a deployment mid-apply

permissions:
  id-token: write # OIDC token for AWS
  contents: read
  actions: read # download CI's plan artifacts from the triggering run

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}

jobs:
  build-push:
    name: Build & push images (dev ECR)
    runs-on: ubuntu-latest
    # Only after a successful CI run for a push to master. If CI failed, was on a
    # PR, or ran on another branch, this (and everything downstream) is skipped.
    if: >-
      github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event == 'push'
      && (github.event.workflow_run.head_branch == 'master'
      || github.event.workflow_run.head_branch == 'main')
    outputs:
      registry: ${{ steps.ecr.outputs.registry }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build & push api
        uses: docker/build-push-action@v6
        with:
          context: api/MovieSearch
          file: api/MovieSearch/src/Api/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/movie-search-dev/api:${{ env.IMAGE_TAG }}
            ${{ steps.ecr.outputs.registry }}/movie-search-dev/api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build & push mcp-server
        uses: docker/build-push-action@v6
        with:
          context: mcp-server
          file: mcp-server/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/movie-search-dev/mcp-server:${{ env.IMAGE_TAG }}
            ${{ steps.ecr.outputs.registry }}/movie-search-dev/mcp-server:latest
          cache-from: type=gha,scope=mcp-server
          cache-to: type=gha,scope=mcp-server,mode=max

  deploy-dev:
    name: Deploy dev (apply reviewed plan)
    runs-on: ubuntu-latest
    needs: build-push
    environment: dev # required reviewers here gate the apply — inspect the plan first
    outputs:
      api_base_url: ${{ steps.outputs.outputs.api_base_url }}
    defaults:
      run:
        working-directory: terraform/environments/dev
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Download reviewed dev plan (from the CI run)
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-dev
          path: terraform/environments/dev
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.7"
          terraform_wrapper: false

      - name: Terraform init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=movie-search/dev/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      # Applies the exact plan reviewed in CI. If the state moved since the plan
      # was captured, Terraform rejects the stale plan and the run must be re-done.
      - name: Terraform apply (saved plan)
        run: terraform apply -input=false tfplan

      - name: Collect outputs
        id: outputs
        run: |
          echo "api_base_url=$(terraform output -raw api_base_url)" >> "$GITHUB_OUTPUT"
          echo "### Dev deployed :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "API: $(terraform output -raw api_base_url)" >> "$GITHUB_STEP_SUMMARY"

  smoke-dev:
    name: Smoke tests (dev)
    runs-on: ubuntu-latest
    needs: deploy-dev
    steps:
      - name: API health
        run: curl -fsS "${{ needs.deploy-dev.outputs.api_base_url }}/health"

      - name: Authenticate and call reader endpoint
        run: |
          EMAIL="smoke-${GITHUB_RUN_ID}@example.com"
          PASSWORD="SmokePass123!"

          curl -fsS -X POST "${{ needs.deploy-dev.outputs.api_base_url }}/api/v1/auth/signup" \
            -H "content-type: application/json" \
            -d "{\"email\":\"${EMAIL}\",\"password\":\"${PASSWORD}\"}" > /dev/null

          TOKEN=$(curl -fsS -X POST "${{ needs.deploy-dev.outputs.api_base_url }}/api/v1/auth/login" \
            -H "content-type: application/json" \
            -d "{\"email\":\"${EMAIL}\",\"password\":\"${PASSWORD}\"}" | jq -r '.access_token')

          test -n "$TOKEN" && [ "$TOKEN" != "null" ]

          curl -fsS "${{ needs.deploy-dev.outputs.api_base_url }}/api/v1/movies/genres" \
            -H "Authorization: Bearer $TOKEN"

  deploy-prod:
    name: Deploy prod (apply reviewed plan)
    runs-on: ubuntu-latest
    needs: [build-push, deploy-dev, smoke-dev]
    environment:
      name: production # required reviewers on this environment gate the prod apply
    defaults:
      run:
        working-directory: terraform/environments/prod
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Promote images dev -> prod repositories
        working-directory: .
        run: |
          REGISTRY="${{ needs.build-push.outputs.registry }}"
          for image in api mcp-server; do
            docker pull "$REGISTRY/movie-search-dev/$image:$IMAGE_TAG"
            docker tag  "$REGISTRY/movie-search-dev/$image:$IMAGE_TAG" "$REGISTRY/movie-search-prod/$image:$IMAGE_TAG"
            docker push "$REGISTRY/movie-search-prod/$image:$IMAGE_TAG"
          done

      - name: Download reviewed prod plan (from the CI run)
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-prod
          path: terraform/environments/prod
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.7"
          terraform_wrapper: false

      - name: Terraform init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=movie-search/prod/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform apply (saved plan)
        run: terraform apply -input=false tfplan

      - name: Summary
        run: |
          echo "### Prod deployed :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "API: $(terraform output -raw api_base_url)" >> "$GITHUB_STEP_SUMMARY"
