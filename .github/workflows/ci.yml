# CI — runs on every PR and every push to master.
#
#   dotnet      build + unit tests for the .NET API solution
#   python      ruff + pytest for the pipeline and the MCP server (matrix)
#   docker      the three service images must build (no push)
#   terraform   fmt + validate over the whole stack

name: CI

on:
  workflow_call:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_VERSION: 10.0.x
  PYTHON_VERSION: "3.13"

jobs:
  dotnet:
    name: .NET build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Format check
        run: dotnet format api/MovieSearch/MovieSearch.slnx --verify-no-changes --verbosity minimal

      - name: Restore
        run: dotnet restore api/MovieSearch

      - name: Build
        run: dotnet build api/MovieSearch --no-restore --configuration Release

      - name: Test
        run: >-
          dotnet test api/MovieSearch --no-build --configuration Release
          --logger "console;verbosity=normal"

  python:
    name: Python lint & test (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [pipeline, mcp-server]
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: ${{ matrix.project }}/uv.lock

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff
        run: uv run --no-sync ruff check .

      - name: Mypy
        run: >-
          uvx --python ${{ env.PYTHON_VERSION }} mypy
          --ignore-missing-imports
          src

      - name: Pytest
        run: uv run --no-sync pytest -q

  docker:
    name: Docker build (${{ matrix.image.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - { name: api, context: api/MovieSearch, dockerfile: api/MovieSearch/src/Api/Dockerfile }
          - { name: mcp-server, context: mcp-server, dockerfile: mcp-server/Dockerfile }
          # Repo-root context: the image bakes in database/migrations.
          - { name: pipeline, context: ., dockerfile: pipeline/Dockerfile }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: false
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max

  compose-integration:
    name: Docker Compose integration smoke
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4

      - name: Create CI .env
        run: |
          cat <<'EOF' > .env
          POSTGRES_USER=movies
          POSTGRES_PASSWORD=movies_pw
          POSTGRES_DB=movies
          REDIS_PASSWORD=redis_pw
          JWT_SIGNING_KEY=ci-signing-key-ci-signing-key-ci-signing-key
          GRAFANA_ADMIN_PASSWORD=admin
          EOF

      - name: Start integration subset
        run: docker compose up --build -d --wait postgres redis prometheus grafana jaeger

      - name: Integration assertions
        run: |
          docker compose ps
          docker compose exec -T postgres pg_isready -U movies -d movies
          curl -fsS http://localhost:9090/-/healthy
          curl -fsS http://localhost:3000/api/health
          curl -fsS http://localhost:16686/

      - name: Collect service logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=200

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  terraform:
    name: Terraform fmt & validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Validate (dev, prod, bootstrap)
        run: |
          for dir in environments/dev environments/prod bootstrap; do
            echo "::group::$dir"
            terraform -chdir="$dir" init -backend=false -input=false > /dev/null
            terraform -chdir="$dir" validate
            echo "::endgroup::"
          done

      - name: Configure AWS credentials for plan
        if: ${{ vars.AWS_DEPLOY_ROLE_ARN != '' && vars.AWS_REGION != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Plan (dev/prod)
        if: ${{ vars.AWS_DEPLOY_ROLE_ARN != '' && vars.AWS_REGION != '' }}
        run: |
          terraform -chdir=environments/dev plan -input=false -lock=false -refresh=false -var "image_tag=ci" -var "github_repository=${{ github.repository }}" -var "create_github_oidc_provider=false"
          terraform -chdir=environments/prod plan -input=false -lock=false -refresh=false -var "image_tag=ci" -var "github_repository=${{ github.repository }}" -var "create_github_oidc_provider=false"

      - name: Plan skipped notice
        if: ${{ vars.AWS_DEPLOY_ROLE_ARN == '' || vars.AWS_REGION == '' }}
        run: echo "Skipping terraform plan because AWS_DEPLOY_ROLE_ARN/AWS_REGION repository variables are not configured."
