# CI — runs on every PR and every push to master.
#
#   dotnet               build + unit tests for the .NET API solution
#   python               ruff + pytest for the pipeline and the MCP server (matrix)
#   docker               the three service images must build (no push)
#   compose-integration  docker-compose smoke of the backing services
#   terraform-validate   fmt + validate over the whole stack
#   terraform-plan       (push to master only) a real, applyable `terraform plan`
#                        per environment, uploaded as a downloadable artifact and
#                        rendered to the run summary. CD downloads and applies
#                        these exact saved plans, so a reviewer can inspect them
#                        before approving each deploy.
#
# The data pipeline is linted, tested and image-built here, but it is NOT
# deployed to AWS — it runs locally via docker-compose. CD never pushes or
# deploys the pipeline image.

name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_VERSION: 10.0.x
  PYTHON_VERSION: "3.13"

jobs:
  dotnet:
    name: .NET build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Format check
        run: dotnet format api/MovieSearch/MovieSearch.slnx --verify-no-changes --verbosity minimal

      - name: Restore
        run: dotnet restore api/MovieSearch

      - name: Build
        run: dotnet build api/MovieSearch --no-restore --configuration Release

      - name: Test
        run: >-
          dotnet test api/MovieSearch --no-build --configuration Release
          --logger "console;verbosity=normal"

  python:
    name: Python lint & test (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [pipeline, mcp-server]
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: ${{ matrix.project }}/uv.lock

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff
        run: uv run --no-sync ruff check .

      - name: Mypy
        run: >-
          uvx --python ${{ env.PYTHON_VERSION }} mypy
          --ignore-missing-imports
          src

      - name: Pytest
        run: uv run --no-sync pytest -q

  docker:
    name: Docker build (${{ matrix.image.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - { name: api, context: api/MovieSearch, dockerfile: api/MovieSearch/src/Api/Dockerfile }
          - { name: mcp-server, context: mcp-server, dockerfile: mcp-server/Dockerfile }
          # Pipeline image is built to validate its Dockerfile (used by
          # docker-compose); it is never pushed or deployed to AWS.
          - { name: pipeline, context: ., dockerfile: pipeline/Dockerfile }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: false
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max

  compose-integration:
    name: Docker Compose integration smoke
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4

      - name: Create CI .env
        run: |
          cat <<'EOF' > .env
          POSTGRES_USER=movies
          POSTGRES_PASSWORD=movies_pw
          POSTGRES_DB=movies
          REDIS_PASSWORD=redis_pw
          JWT_SIGNING_KEY=ci-signing-key-ci-signing-key-ci-signing-key
          GRAFANA_ADMIN_PASSWORD=admin
          EOF

      - name: Start integration subset
        run: docker compose up --build -d --wait postgres redis prometheus grafana jaeger

      - name: Integration assertions
        run: |
          docker compose ps
          docker compose exec -T postgres pg_isready -U movies -d movies
          curl -fsS http://localhost:9090/-/healthy
          curl -fsS http://localhost:3000/api/health
          curl -fsS http://localhost:16686/

      - name: Collect service logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=200

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  terraform-validate:
    name: Terraform fmt & validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.7"

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Validate (dev, prod)
        run: |
          for dir in environments/dev environments/prod; do
            echo "::group::$dir"
            terraform -chdir="$dir" init -backend=false -input=false > /dev/null
            terraform -chdir="$dir" validate
            echo "::endgroup::"
          done

  terraform-plan:
    name: Terraform plan (${{ matrix.env }})
    runs-on: ubuntu-latest
    needs: terraform-validate
    # Produce a real, applyable plan only for pushes to master, and only when AWS
    # access is configured. CD downloads and applies these exact artifacts.
    if: >-
      github.event_name == 'push'
      && vars.AWS_DEPLOY_ROLE_ARN != ''
      && vars.AWS_REGION != ''
    permissions:
      id-token: write # OIDC token for AWS
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # dev creates the account-wide GitHub OIDC provider; prod references
          # the one dev already created (deploy-dev runs before deploy-prod).
          - { env: dev, create_oidc: "true" }
          - { env: prod, create_oidc: "false" }
    defaults:
      run:
        working-directory: terraform/environments/${{ matrix.env }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.7"
          terraform_wrapper: false

      - name: Terraform init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=movie-search/${{ matrix.env }}/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      # The plan is generated with the SAME variables CD applies with, so the
      # saved plan CD consumes is exactly what was reviewed here. image_tag is
      # the commit SHA — CD builds/pushes those images before applying.
      - name: Terraform plan
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          terraform plan -input=false -lock-timeout=120s -out=tfplan \
            -var "image_tag=${{ github.sha }}" \
            -var "github_repository=${{ github.repository }}" \
            -var "create_github_oidc_provider=${{ matrix.create_oidc }}" \
            -var "terraform_state_bucket_arn=arn:aws:s3:::${{ vars.TF_STATE_BUCKET }}" \
            -var "terraform_lock_table_arn=arn:aws:dynamodb:${{ vars.AWS_REGION }}:${ACCOUNT_ID}:table/${{ vars.TF_LOCK_TABLE }}"
          terraform show -no-color tfplan > plan.txt

      - name: Render plan to job summary
        run: |
          {
            echo "### Terraform plan — ${{ matrix.env }} (commit ${GITHUB_SHA::7})"
            echo ""
            echo '```'
            # Cap to stay under the summary size limit; the full plan is in the artifact.
            head -c 900000 plan.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # Sensitive values are redacted in plan.txt, but the binary tfplan can
      # embed them — keep retention short; artifacts are repo-members only.
      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ matrix.env }}
          path: |
            terraform/environments/${{ matrix.env }}/tfplan
            terraform/environments/${{ matrix.env }}/plan.txt
          retention-days: 5
          if-no-files-found: error

  terraform-plan-skipped:
    name: Terraform plan (skipped)
    runs-on: ubuntu-latest
    needs: terraform-validate
    if: >-
      github.event_name != 'push'
      || vars.AWS_DEPLOY_ROLE_ARN == ''
      || vars.AWS_REGION == ''
    steps:
      - run: |
          echo "Applyable terraform plans are produced only on push to master with"
          echo "AWS_DEPLOY_ROLE_ARN / AWS_REGION repository variables configured."
          echo "CD (which applies these plans) will not have artifacts to consume otherwise."
